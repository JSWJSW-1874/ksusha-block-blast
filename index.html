<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ksusha's Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Trebuchet MS', Arial, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    padding: 28px 18px;
    position: relative;
    overflow: hidden;
    background: #07071a;
  }

  /* animated rainbow backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg,#ff0080,#ff8c00,#ffe600,#00e676,#00b0ff,#aa00ff,#ff0080);
    background-size: 400% 400%;
    animation: bgShift 7s ease infinite;
    opacity: 0.85;
  }
  @keyframes bgShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  /* floating blurred orbs */
  .orb { position: fixed; border-radius: 50%; filter: blur(55px); opacity: 0.5; z-index: 0; pointer-events: none; animation: float linear infinite; }
  @keyframes float { 0%,100%{ transform: translateY(0) scale(1);} 50%{ transform: translateY(-36px) scale(1.12);} }

  .wrap { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; max-width: 460px; }

  h1 {
    font-size: 2.6rem;
    text-align: center;
    line-height: 1.05;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 3px 0 #00000044, 0 0 22px #ffffff88;
  }
  h1 .small { display:block; font-size: 1.1rem; letter-spacing: 4px; opacity: 0.9; margin-bottom: 6px; }

  .cards { display: flex; flex-direction: column; gap: 20px; width: 100%; }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 22px;
    border-radius: 22px;
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    border: 3px solid #ffffff55;
    box-shadow: 0 8px 0 #00000033, 0 12px 28px #0006;
    transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;
    position: relative;
    overflow: hidden;
  }
  .card:active { transform: translateY(6px); box-shadow: 0 2px 0 #00000033, 0 6px 16px #0006; }
  .card:hover { filter: brightness(1.08); }

  .card-blocks { background: linear-gradient(135deg,#7b1fa2,#e91e63,#ff9800); }
  .card-beach  { background: linear-gradient(135deg,#00b0ff,#26c6da,#ffe082); }

  .card .emoji { font-size: 3.2rem; flex-shrink: 0; filter: drop-shadow(0 3px 4px #0004); }
  .card .txt { display: flex; flex-direction: column; gap: 4px; }
  .card .title { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; text-shadow: 0 2px 4px #0006; }
  .card .desc { font-size: 0.92rem; opacity: 0.95; line-height: 1.35; }
  .card .play-tag {
    margin-left: auto;
    font-size: 0.85rem;
    font-weight: bold;
    background: #ffffff33;
    border: 2px solid #ffffff77;
    padding: 8px 14px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .footer { position: relative; z-index: 2; font-size: 0.8rem; opacity: 0.85; text-align: center; text-shadow: 0 1px 3px #0008; }

  @media (max-width: 420px) {
    h1 { font-size: 2.1rem; }
    .card .emoji { font-size: 2.6rem; }
    .card .title { font-size: 1.25rem; }
    .card .play-tag { display: none; }
  }
</style>
</head>
<body>

<div class="orb" style="width:300px;height:300px;background:#ff00cc;top:-60px;left:-50px;animation-duration:8s;"></div>
<div class="orb" style="width:260px;height:260px;background:#00ffd0;bottom:-50px;right:-40px;animation-duration:10s;animation-delay:-3s;"></div>
<div class="orb" style="width:200px;height:200px;background:#ffe600;top:40%;left:-40px;animation-duration:9s;animation-delay:-1s;"></div>

<div class="wrap">
  <h1><span class="small">WELCOME TO</span>KSUSHA'S<br>GAMES 🎮</h1>

  <div class="cards">
    <a class="card card-blocks" href="blocks.html">
      <div class="emoji">🟪</div>
      <div class="txt">
        <div class="title">Block Blast</div>
        <div class="desc">Drop colourful blocks and clear rows &amp; columns for combos!</div>
      </div>
      <div class="play-tag">PLAY ▶</div>
    </a>

    <a class="card card-beach" href="beach.html">
      <div class="emoji">🏝️</div>
      <div class="txt">
        <div class="title">Shell Hunt</div>
        <div class="desc">Collect seashells on a Maldives beach to reach new islands!</div>
      </div>
      <div class="play-tag">PLAY ▶</div>
    </a>
  </div>
</div>

<div class="footer">Made with ❤️ for Ksusha</div>

</body>
</html>
